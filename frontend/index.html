<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notes</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="brand">Notes</h1>
    <div class="user-info">
      <span id="user-email" class="user-email"></span>
      <button id="logout-btn" class="btn-secondary" type="button">Sign out</button>
    </div>
  </header>

  <main class="app-main">
    <section class="card">
      <h2 id="form-title">New note</h2>
      <form id="note-form">
        <label>
          Title
          <input type="text" name="title" required maxlength="255" />
        </label>
        <label>
          Content
          <textarea name="content" rows="4"></textarea>
        </label>
        <label>
          Tags (comma-separated)
          <input type="text" name="tags" placeholder="work, todo" />
        </label>
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="submit-btn">Create</button>
          <button type="button" class="btn-secondary hidden" id="cancel-btn">Cancel</button>
        </div>
      </form>
    </section>

    <section class="filters">
      <input type="search" id="search-input" placeholder="Search notes..." aria-label="Search" />
      <select id="tag-filter" aria-label="Filter by tag">
        <option value="">All tags</option>
      </select>
    </section>

    <section id="notes-list" class="notes-list"></section>
    <p id="empty-state" class="empty hidden">No notes yet — create one above.</p>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
