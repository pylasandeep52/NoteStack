# Render Blueprint — describes the entire production infra as code.
# Render reads this file when you create a Blueprint and provisions:
#   1. A managed PostgreSQL database called "notes-db"
#   2. A web service running our Docker image, with env vars wired up
#
# Auto-deploys: every push to `main` triggers a rebuild and rolling deploy.

services:
  - type: web
    name: NoteStack
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: NoteStack
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString

databases:
  - name: notes-db
    plan: free
    databaseName: notes
    user: notes
